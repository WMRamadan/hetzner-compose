network:
  name: private
  ip_range: 10.0.0.0/16
  subnet:
    ip_range: 10.0.1.0/24
    zone: eu-central

firewall:
  name: web-fw
  rules:
    - protocol: tcp
      port: "22"
      source_ips: ["0.0.0.0/0"]
    - protocol: tcp
      port: "80"
      source_ips: ["0.0.0.0/0"]

servers:
  - name: app
    type: cx23
    image: ubuntu-22.04
    location: nbg1
    ssh_keys:
      - ~/.ssh/id_rsa.pub